name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: rust / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: install rust
        run: rustup toolchain install stable --profile minimal --component clippy --target ${{ matrix.target }}
      - name: cache
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0  # v2.8.0
        with:
          workspaces: '. -> target'
          key: ${{ matrix.target }}
      - run: cargo clippy --all-targets --target ${{ matrix.target }} -- -D warnings
      - run: cargo test --all-targets --target ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}

  python:
    name: python
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231  # v5.1.0
        with:
          enable-cache: true
      - run: rustup toolchain install stable --profile minimal
      - name: install CLI on PATH
        run: cargo install --path cli --root "$HOME/.local"
      - name: create venv + install
        run: |
          cd python
          uv venv --python 3.11 .venv
          source .venv/bin/activate
          uv pip install -e .
          uv pip install mcp anyio pytest
      - name: run E2E suite
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd python
          source .venv/bin/activate
          python -m pytest ../tests/e2e/ -v

  node:
    name: node
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '22'
      - run: rustup toolchain install stable --profile minimal
      - run: cargo install --path cli --root "$HOME/.local"
      - name: build + test
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd node
          npm ci || npm install
          npm run build
          node --test dist/tests/hook.test.js
